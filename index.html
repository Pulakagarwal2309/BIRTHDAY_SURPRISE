<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Vamika 🎂</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  overflow:hidden;
  font-family:system-ui,-apple-system,sans-serif;
  background:linear-gradient(135deg,#ff9a9e 0%,#fecfef 50%,#fecfef 100%);
  height:100vh;
  position:relative;
}
#panda {
  position:absolute; bottom:30px; left:-120px; width:100px; 
  transition:left 2s ease-out; z-index:2;
}
#rope {
  position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:8px; height:200px; background:#333; cursor:pointer;
  border-radius:4px; box-shadow:0 0 10px rgba(0,0,0,0.3);
}
#banner {
  position:absolute; top:-200px; left:50%; transform:translateX(-50%);
  background:#ff4d6d; color:white; padding:20px 40px; font-size:2em;
  border-radius:12px; text-align:center; transition:top 1s ease;
  box-shadow:0 10px 30px rgba(255,77,109,0.4);
}
#message {
  position:absolute; top:220px; width:100%; text-align:center;
  font-size:1.3em; color:#444; opacity:0; transition:opacity 1s;
  padding:20px; line-height:1.6;
}
#help {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  background:rgba(0,0,0,0.8); color:white; padding:15px 25px;
  border-radius:10px; font-size:1.1em; opacity:0; transition:opacity 0.5s;
}
.confetti {
  position:absolute; width:10px; height:10px; background:#ff4d6d;
  border-radius:50%; top:-10px; animation:fall 3s linear infinite;
}
@keyframes fall {
  to { transform:translateY(110vh) rotate(720deg); }
}
.pulse { animation:pulse 0.5s infinite; }
@keyframes pulse {
  0%,100%{ transform:scale(1); }
  50%{ transform:scale(1.1); }
}
</style>
</head>
<body>

<img id="panda" src="https://cdn-icons-png.flaticon.com/512/616/616408.png">
<div id="rope"></div>
<div id="banner">🎉 Happy Birthday Vamika 🎉</div>
<div id="message">
✨ Dear Vamika ✨<br><br>
Aaj ka din sirf tumhara hai 💖<br>
Tumhari smile duniya ko beautiful banati 🌸<br>
Har khushi mile, har sapna pura ho ✨<br><br>
You deserve all the love ❤️<br>
Stay khush always! 💫<br><br>
💌 Happy Birthday 💌
</div>
<div id="help">🐼 Tap rope 3 times to help Panda!</div>

<script>
let clicks=0;
document.getElementById('panda').style.left='40%';
document.getElementById('rope').onclick=()=>{
  clicks++;
  document.getElementById('panda').style.bottom='70px';
  setTimeout(()=>document.getElementById('panda').style.bottom='30px',200);
  
  if(clicks===2) document.getElementById('help').style.opacity=1;
  if(clicks===3){
    document.getElementById('help').style.opacity=0;
    document.getElementById('rope').classList.add('pulse');
    document.getElementById('banner').style.top='80px';
    setTimeout(()=>document.getElementById('message').style.opacity=1,800);
    
    // Confetti
    for(let i=0;i<60;i++){
      let c=document.createElement('div');
      c.className='confetti';
      c.style.left=Math.random()*100+'vw';
      c.style.background=`hsl(${Math.random()*360},100%,60%)`;
      c.style.animationDuration=(2+Math.random()*2)+'s';
      document.body.appendChild(c);
    }
    
    // 🎵 Sound Effect (no external file needed)
    let audio=new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAo');
    audio.play();
  }
};
</script>
</body>
</html>
