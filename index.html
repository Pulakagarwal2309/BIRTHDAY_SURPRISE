<!DOCTYPE html>
<html>
<head>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg"></div>

<!-- 🍫 Chocolate House -->
<div class="house">
  <div class="roof"></div>
  <div class="door"></div>
</div>

<!-- 🐼 Panda -->

    <div class="eye right"></div>
    <div class="nose"></div>
  </div>
</div>

<!-- Rope -->
<div id="rope"></div>

<!-- Help -->
<div id="help">Help! Pull the rope 🪢</div>

<!-- Banner -->
<div id="banner">🎉 Happy Birthday Vamika 🎉</div>

<!-- Message -->
<div id="msg"></div>

<script src="script.js"></script>

</body>
</html>
